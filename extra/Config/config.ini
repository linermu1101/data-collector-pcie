[RegisterParams]
# 0x60 触发模式配置
# 0: 软件触发模式
# 1: 硬件触发模式
# 2: 背板触发模式
# 3: 复位
trigMode=0

# 单频/三频信号极值点配置 (根据频谱分析设置)
nf0_r=20    ; 参考信号第一个极值点 (0x08)
nf1_r=30    ; 参考信号第二个极值点 (0x0C)
nf2_r=50    ; 参考信号第三个极值点 (0x10)
nf0_s=20    ; 测量信号第一个极值点 (0x14)
nf1_s=30    ; 测量信号第二个极值点 (0x18)
nf2_s=50    ; 测量信号第三个极值点 (0x1C)

# 相位输出配置
density_ratio_b=0    ; 相位输出动态范围 0~64π (0x20)
change_rt=6250      ; 反馈间隔点数，12.5M采样率，0.5ms反馈一次 (0x24)

# 相位翻转配置
symb_on=0          ; 0:不自动判断相位取反 1:自动判断相位取反 (0x28)
symbol=0           ; symb_on=0时: 0:相位取反 1:相位不取反 (0x2C)
sym_time=10        ; 相位翻转判断时间(ms) (0x30)

# 信号模式选择
singal_mode=0      ; 0:单频 1:三频 (0x3C)